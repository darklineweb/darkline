<style>
body {

/* HEADER */
header {
  text-align:center;

/* SEARCH */
#search {
  width:90%;
  margin:20px auto;
  display:block;
  padding:12px;
  border:none;

/* GRID */
.feed {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover {

}

/* VIDEO */

}

/* TEXT */

<!-- BLOG SECTION -->

<script>

/* SAMPLE VIDEO DATA (YOU CAN EXPAND) */
const videos = [
  {title:"Sad Love Edit", src:"videos/video1.mp4"},
  {title:"Attitude Reel", src:"videos/video2.mp4"},
  {title:"Bike Edit", src:"videos/video3.mp4"},
];

/* LOAD VIDEOS */
const feed = document.getElementById("feed");

function loadVideos(list){
  feed.innerHTML = "";
  list.forEach(v=>{
    feed.innerHTML += `
      <div class="card">
        <video src="${v.src}" controls></video>
        <h3>${v.title}</h3>
      </div>
    `;
  });
}

loadVideos(videos);

/* SEARCH SYSTEM */
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();
  const filtered = videos.filter(v=>v.title.toLowerCase().includes(val));
  loadVideos(filtered);
});

</script>

</body>
